<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rowing Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0a1628;
  --card:#112240;
  --accent:#00b4d8;
  --text:#e6f1ff;
  --muted:#7a9bb5;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
}

header{
  padding:20px;
  background:#0f2545;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(0,180,216,0.2);
}

h1 span{color:var(--accent);}

main{
  max-width:900px;
  margin:auto;
  padding:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
  border:1px solid rgba(0,180,216,0.2);
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid rgba(255,255,255,0.1);
  background:#0a1628;
  color:white;
}

button{
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.primary{background:var(--accent); color:black;}
.ghost{background:none; border:1px solid rgba(255,255,255,0.2); color:var(--text);}

.crew{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.crew button.active{
  background:var(--accent);
  color:black;
}

table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:10px;
  border-bottom:1px solid rgba(255,255,255,0.05);
}

.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

.training{background:rgba(0,180,216,0.2); color:var(--accent);}
.race{background:rgba(255,80,80,0.2); color:#ff5c5c;}
</style>
</head>

<body>

<header>
  <h1>Rowing <span>Tracker</span></h1>
  <div>sessions · splits · export</div>
</header>

<main>

<div class="crew">
  <button onclick="setCrew('inter')" id="c1" class="active">Inter</button>
  <button onclick="setCrew('junior')" id="c2">Junior</button>
  <button onclick="setCrew('senior')" id="c3">Senior</button>
</div>

<div class="card">
  <div class="grid">
    <input id="dist" placeholder="Distance (m)">
    <input id="split" placeholder="Split (1:45)">
    <input id="date" type="date">
  </div>
  <br>
  <button class="primary" onclick="add()">Add Session</button>
</div>

<div class="card">
  <table>
    <thead>
      <tr>
        <th>Distance</th>
        <th>Split</th>
        <th>Date</th>
        <th>Type</th>
      </tr>
    </thead>
    <tbody id="list"></tbody>
  </table>
</div>

</main>

<script>
let data={inter:[],junior:[],senior:[]};
let crew='inter';

function setCrew(c){
  crew=c;
  document.querySelectorAll('.crew button').forEach(b=>b.classList.remove('active'));
  document.getElementById('c1').classList.toggle('active',c==='inter');
  document.getElementById('c2').classList.toggle('active',c==='junior');
  document.getElementById('c3').classList.toggle('active',c==='senior');
  render();
}

function save(){
  localStorage.setItem('rt',JSON.stringify(data));
}

function load(){
  const d=localStorage.getItem('rt');
  if(d) data=JSON.parse(d);
}

function add(){
  const dist=document.getElementById('dist').value;
  const split=document.getElementById('split').value;
  const date=document.getElementById('date').value;

  if(!dist||!split||!date) return alert('fill all');

  data[crew].push({dist,split,date,type:'training'});
  save();
  render();
}

function render(){
  const el=document.getElementById('list');
  el.innerHTML='';
  data[crew].forEach(s=>{
    el.innerHTML+=`<tr>
      <td>${s.dist}m</td>
      <td>${s.split}</td>
      <td>${s.date}</td>
      <td><span class="badge training">${s.type}</span></td>
    </tr>`;
  });
}

load();
render();
</script>

</body>
</html>
